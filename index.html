<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Forte™ | Strategic Growth & PR Agency</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* 
      INTEGRATED CSS SNIPPETS (REFINED FOR VOICE FORTE COLORS)
      Primary: #c5a059 (Gold)
      Dark: #050a18 (Navy)
    */
    :root {
      --primary-color: #c5a059;
      --primary-dark: #a88548;
      --primary-light: #f4ecd8;
      --accent-gold: #c5a059;
      --dark-bg: #050a18;
      --dark-card: #0f172a;
      --dark-text: #f8fafc;
      --dark-gray: #64748b;
      --light-bg: #ffffff;
      --light-card: #f8fafc;
      --light-text: #1e293b;
      --light-gray: #94a3b8;
      
      --gradient-brand: linear-gradient(135deg, #c5a059, #a88548);
      --gradient-dark: linear-gradient(135deg, #050a18, #0f172a);
      --shadow-brand: 0 0 20px rgba(197, 160, 89, 0.3);
      
      --font-primary: 'Inter', sans-serif;
      --font-secondary: 'Poppins', sans-serif;
      --transition-normal: 300ms ease;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --space-md: 1rem;
      --space-lg: 1.5rem;
      --space-xl: 2rem;
      --space-2xl: 3rem;
      --container-xl: 1200px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; max-width: 100%; overflow-x: hidden; font-family: var(--font-primary); background-color: var(--dark-bg); color: #fff; }

    .hero-section {
      background: var(--gradient-dark) !important;
      color: #fff !important;
      padding: 120px 0 80px !important;
      margin-top: 60px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-title {
      color: #fff !important;
      font-size: clamp(2.5rem, 6vw, 4.5rem) !important;
      font-weight: 800 !important;
      line-height: 1.1 !important;
      text-shadow: 0 2px 10px rgba(0,0,0,.3);
      margin-bottom: 1.5rem;
    }

    .hero-subtitle {
      color: #e2e8f0 !important;
      font-size: clamp(1rem, 2.5vw, 1.25rem) !important;
      font-weight: 400 !important;
      line-height: 1.6 !important;
      max-width: 850px !important;
      margin: 0 auto 2.5rem !important;
    }

    .hero-badge {
      background: rgba(197, 160, 89, 0.15) !important;
      color: var(--accent-gold) !important;
      border: 1px solid rgba(197, 160, 89, 0.3) !important;
      padding: 10px 24px !important;
      border-radius: 50px !important;
      font-weight: 600;
      display: inline-block !important;
      margin-bottom: 24px !important;
      font-size: 0.875rem;
      letter-spacing: 1px;
    }

    .hero-stats, .cta-stats {
      margin-top: 60px !important;
      gap: 30px !important;
      display: flex !important;
      justify-content: center !important;
      flex-wrap: wrap !important;
      width: 100%;
    }

    .stat-item, .cta-stat {
      padding: 24px 40px !important;
      background: rgba(255, 255, 255, 0.03) !important;
      backdrop-filter: blur(10px) !important;
      border-radius: 12px !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      transition: all .3s ease !important;
      text-align: center !important;
      flex: 1;
      min-width: 200px;
      max-width: 280px;
    }

    .stat-item:hover, .cta-stat:hover {
      background: rgba(255, 255, 255, 0.06) !important;
      transform: translateY(-5px) !important;
      border-color: var(--accent-gold) !important;
    }

    .stat-item h3, .cta-stat-number {
      color: var(--accent-gold) !important;
      font-size: 3rem !important;
      font-weight: 800 !important;
      margin-bottom: 5px !important;
      text-shadow: 0 2px 5px rgba(197, 160, 89, 0.3);
    }

    .stat-item p, .cta-stat-label {
      color: #cbd5e1 !important;
      font-size: 0.85rem !important;
      font-weight: 700 !important;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0 !important;
    }

    /* Section Styles */
    .section { padding: 80px 0; width: 100%; }
    .bg-light { background: #fff !important; color: #111827 !important; }
    .bg-dark { background: var(--gradient-dark) !important; color: #f1f5f9 !important; }
    .bg-gradient-brand { background: var(--gradient-brand) !important; color: #fff !important; }

    .section-title { font-size: 2.75rem !important; font-weight: 800 !important; margin-bottom: 1rem !important; text-align: center; }
    .section-subtitle { font-size: 1.25rem !important; color: #64748b !important; font-weight: 500 !important; margin-bottom: 3rem !important; text-align: center; }

    /* Component Cards */
    .service-item, .value-card, .why-card {
      border-radius: 12px !important;
      padding: 2.5rem !important;
      transition: all .3s ease !important;
      height: 100% !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .service-item, .value-card {
      background: #fff !important;
      border: 1px solid #e5e7eb !important;
      box-shadow: 0 4px 6px rgba(0,0,0,.04) !important;
    }

    .service-item:hover, .value-card:hover {
      transform: translateY(-8px) !important;
      box-shadow: 0 20px 40px rgba(0,0,0,.1) !important;
      border-color: var(--accent-gold) !important;
    }

    .service-item h4, .value-card h3 {
      color: #0f172a !important;
      font-size: 1.5rem !important;
      font-weight: 700 !important;
      margin-top: 1.5rem !important;
      margin-bottom: 1rem !important;
    }

    .service-item p, .value-card p {
      color: #374151 !important;
      font-size: 1rem !important;
      line-height: 1.7 !important;
    }

    .why-card {
      background: rgba(255,255,255,.05) !important;
      border: 1px solid rgba(255,255,255,.1) !important;
      backdrop-filter: blur(10px) !important;
      color: #cbd5e1 !important;
    }

    .why-card:hover {
      transform: translateY(-8px) !important;
      background: rgba(255,255,255,.08) !important;
      border-color: var(--accent-gold) !important;
    }

    .why-card h3 { color: #fff !important; font-size: 1.5rem !important; font-weight: 700 !important; margin-top: 1.5rem; }

    .card-icon, .value-icon {
      border-radius: 12px !important;
      width: 70px !important;
      height: 70px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      margin-bottom: 1.5rem !important;
      background: var(--primary-light) !important;
    }

    .card-icon i, .value-icon i { font-size: 2rem !important; color: var(--accent-gold) !important; }

    /* Header & Nav */
    .main-header {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background: rgba(5, 10, 24, 0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(197, 160, 89, 0.1);
      height: 70px; display: flex; align-items: center;
    }

    .nav-container {
      display: flex; justify-content: space-between; align-items: center;
      width: 100%; max-width: var(--container-xl); margin: 0 auto; padding: 0 2rem;
    }

    .nav-links { display: flex; list-style: none; gap: 2rem; align-items: center; }
    .nav-links a { color: #fff; font-weight: 600; font-size: 0.9rem; text-decoration: none; transition: color .3s; letter-spacing: 0.5px; }
    .nav-links a:hover { color: var(--accent-gold); }
    
    .nav-cta {
      background: var(--accent-gold); color: #050a18; padding: 10px 24px;
      border-radius: 6px; font-weight: 700; font-size: 0.85rem; text-decoration: none;
      transition: all .3s; letter-spacing: 1px;
    }
    .nav-cta:hover { background: #fff; transform: translateY(-2px); }

    /* Utility */
    .container { width: 100%; max-width: var(--container-xl); margin: 0 auto; padding: 0 1.5rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.875rem 2rem; border-radius: 6px; font-weight: 700;
      text-decoration: none; transition: all .3s; cursor: pointer; gap: 0.75rem;
      font-size: 1rem; letter-spacing: 1px;
    }
    .btn-primary { background: var(--accent-gold); color: #050a18; }
    .btn-primary:hover { background: #fff; transform: translateY(-3px); box-shadow: var(--shadow-brand); }
    .btn-outline-light { border: 2px solid #fff; color: #fff; }
    .btn-outline-light:hover { background: #fff; color: #050a18; }

    .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.5rem; }
    .social-item {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 2rem;
      text-align: center; text-decoration: none; color: #374151; transition: all .3s;
    }
    .social-item:hover { transform: translateY(-8px); border-color: var(--accent-gold); }
    .social-item i { font-size: 2.5rem; margin-bottom: 1rem; display: block; }

    .animate-fade-in { animation: fadeIn 1s ease-out forwards; opacity: 0; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .hero-title { font-size: 2.75rem !important; }
      .section-title { font-size: 2rem !important; }
      .nav-links { display: none; }
    }
  </style>

</script>

</head>

</body>
</html>
